alias loadAnubisCmd "exec  autolineup/maps/Anubis/cmd;"
alias loadAnubisSelectedLabel "cl_radial_radio_tab_0_text_6 #CFG_MAP_Anubis_selected; cl_radial_radio_tab_1_text_6 #CFG_MAP_Anubis_selected; cl_radial_radio_tab_2_text_6 #CFG_MAP_Anubis_selected";

//Ancient
alias loadAncient "alias loadLabelFile loadAncientLabel; alias loadCmdFile loadAncientCmd; alias loadActiveMapLabel loadAncientSelectedLabel"
alias loadAncientLabel "exec  autolineup/maps/Ancient/label"
alias loadAncientCmd "exec  autolineup/maps/Ancient/cmd;"
alias loadAncientSelectedLabel "cl_radial_radio_tab_0_text_7 #CFG_MAP_Ancient_selected; cl_radial_radio_tab_1_text_7 #CFG_MAP_Ancient_selected; cl_radial_radio_tab_2_text_7 #CFG_MAP_Ancient_selected";

//Dust2
alias loadDust2 "alias loadLabelFile loadDust2Label; alias loadCmdFile loadDust2Cmd; alias loadActiveMapLabel loadDust2SelectedLabel"
alias loadDust2Label "exec  autolineup/maps/Dust2/label"
alias loadDust2Cmd "exec  autolineup/maps/Dust2/cmd;"
alias loadDust2SelectedLabel "cl_radial_radio_tab_0_text_3 #CFG_MAP_Dust2_selected; cl_radial_radio_tab_1_text_3 #CFG_MAP_Dust2_selected; cl_radial_radio_tab_2_text_3 #CFG_MAP_Dust2_selected";

//Important settings
fps_max_ui 64;
bind mouse_wheel "#mousewheel; grep"

//Log on/off
alias #al_echo_off "log_flags console +donotecho; log_flags general developer inputservice soundsystem client engineServiceManager +donotecho"
alias #al_echo_on "log_flags general developer inputservice soundsystem client engineServiceManager -donotecho;log_flags console -donotecho;"

//=================================== Resets & Preperations =======================================
alias resetMheel "#mwheelup; #mwheeldown; alias #mousewheel"
alias resetMouse3 "#mouse3"
alias resetMouse "resetSens;bind mouse_x yaw; bind mouse_y pitch;"

alias resetSens resetSensNormal;
alias resetSensNormal "#sensitivity; #sensitivity_y_scale; #m_yaw;"
alias resetSensFaceitNoLag "#sensitivity;multvar sensitivity 0 8 0.5; m_yaw 0.044; sensitivity_y_scale 2"

alias prepSens prepSensNormal;
alias prepSensNormal "sensitivity 1.0;m_yaw 0.022;sensitivity_y_scale 1"
alias prepSensFaceitNoLag "sensitivity 0.5;m_yaw 0.044;sensitivity_y_scale 2"

alias prepFaceitNoLag "alias resetSens resetSensFaceitNoLag; alias prepSens prepSensFaceitNoLag; alias zeroAnglesFaceit zeroAnglesFaceitNoLag;"
alias resetCombo "resetSens; resetMouse; resetMheel;attack -999 0 0; maybeStopForward;alias maybeStopForward;"

alias unbindMouse "unbind mouse_x; unbind mouse_y;"
alias unbindMwheel "unbind mwheelup; unbind mwheeldown"

