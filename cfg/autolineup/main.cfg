//Menus
bind o +settingsWheel                                           //◄ Key bind for MAP SELECTION
bind p +lineupWheel                                             //◄ Key bind for LINEUP SELECTION

//MouseWheel binds - Your mousewheel and mouse3 button (clicking the mousewheel) are temporal reassigned:
//mouse_wheel: Perform the correct throw after selecting a lineup
//mouse3: Jump to the next lineup in an execute combo
//Put your binds for those keys in following aliases
alias #mwheelup                 "bind mwheelup +#Jump;"          //◄ Your mwheelup bind (Default: bhop)
alias #mwheeldown               "bind mwheeldown invnext;"      //◄ Your mwheeldown bind (Default: next inventory slot)
alias #mouse3                   "bind mouse3 +Switch;"          //◄ Your mouse3 bind (Default: quickswitch) 

//Sensitivity
alias #sensitivity              "sensitivity 2.275;"            //◄ Your sensitivity
alias #sensitivity_y_scale      "sensitivity_y_scale 1;"        //◄ Your sensitivity_y_scale (Default = 1)
alias #m_yaw                    "m_yaw 0.022;"                  //◄ Your m_yaw value (Default = 0.022)


//QOL binds - These binds are not essential and can be commented out
bind k +WJumpThrow                                              //◄ Key bind for JUMPTHROW
bind j +JumpThrow                                               //◄ Key bind for WJUMPTHROW
bind SPACE +CrouchJump                                          //◄ Key bind for CROUCHJUMP
//bind i #dsjumpthrow                                           //◄ Key bind for DUCKSPEEDJUMPTHROW
//bind i #wsjumpthrow                                           //◄ Key bind for WALKSPEEDJUMPTHROW

//Sounds - Change sounds or volume - comment out to disable
alias playSelectionSound       "snd_toolvolume 0.15; play sounds\ui\panorama\round_report_odds_up_01.vsnd;"
alias playThrowSound           "snd_toolvolume 0.15; play buttons\blip1.vsnd;"
alias playFthCompletedSound    "snd_toolvolume 0.15; play buttons\blip2.vsnd;"

//Enable this to significantly reduce the freeze lag after selecting an Lineup on faceit
//⚠️ You can only use this if you're using the default "m_yaw = 0.022" and "sensitivity_y_scale = 1" values. ⚠️
//alias enableFaceitNoLag       prepFaceitNoLag;

//Print a guide only visible to you when opening the Lineup menu - comment out to disable
alias showGuide                 ignoremsg;

//This map will be selected by default after startup
alias defaultMap                loadMirage;


