//====================================== RadialRadio ==============================================

alias switchToCmd;

//Settings menu -----------------------------------------------------------------------------------
alias +settingsWheel "#al_echo_off;alias autoLineupMaybeCheckPos autoLineupCheckPos;alias switchToCmd prepareSettingsMenu;cl_radialmenu_deadzone_size 0.4;loadSettingsLabelFile; +radialradio2; exec  autolineup/smartmenu/trackMouse;"
alias -settingsWheel "-radialradio; bind mouse_x yaw; bind mouse_y pitch;loadLabelFile; #al_echo_on"

alias loadSettingsLabelFile "exec  autolineup/settings/label; loadActiveMapLabel"
alias loadSettingsCmdFile "exec  autolineup/settings/cmd;"

alias prepareSettingsMenu "alias switchToCmd;loadSettingsCmdFile;joy_advaxisr -2; startDelayedExecutor; alias timePassedAction closeSettingsMenu;"
alias closeSettingsMenu "-radialradio;"

//Lineup menu-------------------------------------------------------------------------------------
alias +lineupWheel "#al_echo_off;showGuide;showGuide;prepSens;prepareMwheel;buy smokegrenade;alias autoLineupMaybeCheckPos autoLineupCheckPos;alias switchToCmd autoLineupStartTriggered;cl_radialmenu_deadzone_size 0.4;loadLabelFile; +radialradio2; exec  autolineup/smartmenu/trackMouse; alias autoLineupAbortState autoLineupAbort; unbindMwheel"	
alias -lineupWheel "showGuide;resetSens; -radialradio; autoLineupAbortState; maybeStopForward;alias maybeStopForward; alias utilCombo; resetMouse3;bind mouse_x resetCombo; bind mouse_y resetCombo; #al_echo_on"

//====================================== Lineup logic =============================================

alias autoLineupMaybeCheckPos;
alias autoLineupCheckPos "exec  autolineup/smartmenu/checkPos"

alias autoLineupStartTriggered "#al_echo_on; echo AutoLineup: Lineup Selected;#al_echo_off;autoLineupStart"
alias autoLineupStart "alias autoLineupMaybeCheckPos;alias switchToCmd;loadCmdFile;joy_advaxisr -2; startDelayedExecutor; alias timePassedAction autoLineupCloseMenu; #al_echo_on; echo AutoLineup: Loaded Cmd Files;#al_echo_off;"
alias autoLineupCloseMenu "-radialradio;#al_echo_on; echo AutoLineup: Closing RadialRadio Menu;#al_echo_off; alias #mousewheel;"

alias autoLineupSelectedLineup "playSelectionSound; #al_echo_on; echo AutoLineup: Selected Lineup;#al_echo_off; autoLineupZeroAngles;"
alias autoLineupZeroAngles "playSelectionSound;exec  autolineup/utils/zeroingMode;joy_advaxisr -2; startDelayedExecutor; alias timePassedAction  autoLineupPrepareLineup; #al_echo_on; echo AutoLineup: Zeroing Angles;#al_echo_off"

alias autoLineupPrepareLineup "alias tempMouse;joy_advaxisr -2; startDelayedExecutor; alias timePassedAction  autoLineupApplyLineup;"
alias autoLineupApplyLineup "prepSens;pos; alias #mousewheel autoLineupMode;unbindMouse;#al_echo_on;echo AutoLineup: Applied Angles;#al_echo_off;"

alias autoLineupFinish "snd_toolvolume 0.15; playThrowSound; alias autoLineupAbortState; alias #mousewheel; #al_echo_on; echo AutoLineup: Finished; #al_echo_off;"

alias autoLineupAbortState;
alias autoLineupAbort "alias #mousewheel; bind mouse_x resetCombo; bind mouse_y resetCombo; #al_echo_on; echo AutoLineup: Aborted;#al_echo_off"

//====================================== util / aliases ============================================
alias hasCombo          "bind mouse3 +combo"
alias +combo            "prepSens; comboX;"
alias -combo            "prepSens; comboY; alias #mousewheel autoLineupMode"

alias "+Switch"         "slot3"
alias "-Switch"         "slot2; slot1"

alias -#Jump "jump -999 0 0"
alias +#Jump "jump 1 0 0"

alias +WJumpThrow 	    "alias JT! WJumpThrow; 
alias -WJumpThrow 	    "forward -999 0 0;"

alias +JumpThrow 	    "alias JT! JumpThrow; 
alias -JumpThrow; 	

alias JumpThrow 	    "exec autolineup/actions/jumpthrow; 		alias JT!;
alias WJumpThrow 	    "exec autolineup/actions/wjumpthrow; 		alias JT!; 

alias +CrouchJump 	    "alias CJ! CJ+; 
alias -CrouchJump 	    "alias CJ! CJ-;

alias CJ+ 		        "+duck; 		alias CJ! CJ++; 
alias CJ++ 		        "+jump; 		alias CJ!
alias CJ- 		        "duck -999 f u; 	alias CJ! CJ--; 
alias CJ-- 		        "jump -999 f u;		alias CJ!;

//Used Grenade
alias setSmoke          "slot8;"
alias setHe             "slot6;"
alias setFlash          "slot7;"
alias setMolotov        "slot10;"
alias setUndefinedNade;

alias restock;
alias setRestockSmoke   "alias restock restockSmoke;"
alias setRestockHe      "alias restock restockHe;"
alias setRestockFLash   "alias restock restockFlash;"
alias setRestockMolotov "alias restock restockMolotov;"

alias restockSmoke      "open_buymenu; pickup_groundweapon 45; close_buymenu; buy smokegrenade;alias restock;"
alias restockHe         "open_buymenu; pickup_groundweapon 44; close_buymenu; buy hegrenade;alias restock;"
alias restockFlash      "open_buymenu; pickup_groundweapon 43; close_buymenu; buy flashbang;alias restock;" 
alias restockMolotov    "open_buymenu; pickup_groundweapon 46; pickup_groundweapon 48; close_buymenu; buy molotov; buy incgrenade;alias restock;" 

//Throw Mode
alias autoLineupMode;
alias setNone           "alias AutoLineupMode autoLineupNone;"
alias setT              "alias AutoLineupMode autoLineupT;"
alias setJT             "alias AutoLineupMode autoLineupJT;"
alias setWJT            "alias AutoLineupMode autoLineupWJT;"
alias setDSJT           "alias AutoLineupMode autoLineupDSJT;"
alias setWSJT           "alias AutoLineupMode autoLineupWSJT;"
alias setELBOWJT        "alias AutoLineupMode autoLineupELBOWJT;"
alias set2StepRunJT     "alias AutoLineupMode autoLineup2StepRunJT;"
alias setfullRunJT     "alias AutoLineupMode autoLineupfullRunJT;"

alias autoLineupNone    "autoLineupFinish;                                                  #al_echo_on; echo AutoLineup: Completed No Throw;#al_echo_off"
alias autoLineupT       "+#attack;-#attack;-#attack2; autoLineupFinish;                     #al_echo_on; echo AutoLineup: Completed Throw;#al_echo_off"
alias autoLineupJT      "#jumpthrow; autoLineupFinish;                                      #al_echo_on; echo AutoLineup: Completed JT;#al_echo_off"
alias autoLineupWJT     "#wjumpthrow; autoLineupFinish; alias maybeStopForward -#forward;   #al_echo_on; echo AutoLineup: Completed WJT;#al_echo_off"
alias autoLineupDSJT    "#dsjumpthrow; autoLineupFinish;                                    #al_echo_on; echo AutoLineup: Completed FJT;#al_echo_off"
alias autoLineupWSJT    "#wsjumpthrow; autoLineupFinish;                                    #al_echo_on; echo AutoLineup: Completed FJT;#al_echo_off"
alias autoLineupELBOWJT "#elbowjumpthrow; autoLineupFinish;                                 #al_echo_on; echo AutoLineup: Completed FJT;#al_echo_off"
alias autoLineup2StepRunJT "#2steprunjumpthrow; autoLineupFinish;                           #al_echo_on; echo AutoLineup: Completed FJT;#al_echo_off"
alias autoLineupfullRunJT "#fullrunjumpthrow; autoLineupFinish;                             #al_echo_on; echo AutoLineup: Completed FJT;#al_echo_off"

alias +#attack          "attack 1 0 0;"
alias -#attack          "attack -999 0 0;"
alias -#attack2         "attack2 -999 0 0;"
alias +#forward         "forward 1 0 0;"
alias -#forward         "forward -999 0 0;"
alias #jumpthrow        "+JumpThrow "
alias #wjumpthrow       "+WJumpThrow "
alias #dsjumpthrow      "joy_advaxisr 0; alias ## countAndCheckDS;"
alias #wsjumpthrow      "joy_advaxisr 0; alias ## countAndCheckWS;"
alias #elbowjumpthrow   "joy_advaxisr 0; alias ## countAndCheckElbow;"
alias #2steprunjumpthrow"joy_advaxisr 0; alias ## countAndCheck2StepRun;"
alias #fullrunjumpthrow "joy_advaxisr 0; alias ## countAndCheckfullRun;"

alias countAndCheckDS       "incrementvar joy_advaxisr 0 999 1; exec  autolineup/actions/duckspeedjumpthrow;"
alias countAndCheckWS       "incrementvar joy_advaxisr 0 999 1; exec  autolineup/actions/walkspeedjumpthrow;"
alias countAndCheckElbow    "incrementvar joy_advaxisr 0 999 1; exec  autolineup/actions/elbowjumpthrow;"
alias countAndCheck2StepRun "incrementvar joy_advaxisr 0 999 1; exec  autolineup/actions/2steprunjumpthrow;"
alias countAndCheckfullRun  "incrementvar joy_advaxisr 0 999 1; exec  autolineup/actions/fullrunjumpthrow;"

//Delay action by x-frames
alias timePassed            "alias ##; timePassedAction;"
alias startDelayedExecutor  "alias ## exec autolineup/utils/delayedExecutor;"

//=================================================================================================

enableFaceitNoLag;
defaultMap;
